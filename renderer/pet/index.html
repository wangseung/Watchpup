<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'" />
    <title>watchpup pet</title>
    <link rel="stylesheet" href="pet.css" />
  </head>
  <body>
    <button id="bubble" class="bubble hidden" type="button">
      <span class="bubble-copy">
        <span id="bubble-title" class="bubble-title"></span>
        <span id="bubble-detail" class="bubble-detail"></span>
      </span>
      <img id="bubble-spinner" class="bubble-spinner hidden" src="assets/status-progress.png" alt="" />
    </button>
    <div class="pet-dock">
      <div id="pet" class="idle">
        <img id="pet-img" class="hidden" alt="" />
        <div id="pet-sprite" class="hidden"></div>
        <div class="face">🐾</div>
        <span id="badge" class="badge hidden">0</span>
      </div>
      <button id="bubble-toggle" class="bubble-toggle hidden" type="button" aria-label="알림 접기">
        <img src="assets/chevron-down.png" alt="" />
      </button>
    </div>
    <script src="themes.js"></script>
    <script src="codex.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
